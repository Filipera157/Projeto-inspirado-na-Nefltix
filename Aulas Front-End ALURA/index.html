<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Define o conjunto de caracteres como UTF-8 -->
    <meta charset="UTF-8">
    <!-- Configura a viewport para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da página -->
    <title>Netflix</title>
    <!-- Link para o arquivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <!-- Botão para alternar entre modo escuro e claro -->
        <button id="theme-toggle" aria-label="Alternar modo escuro/claro">🌙</button>
        <!-- Título principal da página -->
        <h1>Quem está assistindo?</h1>
        <!-- Seção com perfis disponíveis -->
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li>
                    <!-- Link para o catálogo com o perfil Filipe -->
                    <a href="netflix-plataform-main/catalogo/catalogo.html" class="profile">
                        <figure>
                            <!-- Imagem do perfil Filipe -->
                            <img src="assets/Perfil-1.png" alt="Um personagem de stop motion em estilo gótico, com traços melancólicos em um cenário sombrio">
                            <!-- Nome do perfil -->
                            <figcaption>Filipe</figcaption>
                        </figure>
                    </a>
                </li>
                <li>
                    <!-- Link para o catálogo com o perfil Larissa -->
                    <a href="netflix-plataform-main/catalogo/catalogo.html" class="profile">
                        <figure>
                            <!-- Imagem do perfil Larissa -->
                            <img src="assets/Perfil-2.png" alt="Uma personagem de stop motion com visual retrô e expressivo posa em uma aconchegante">
                            <!-- Nome do perfil -->
                            <figcaption>Larissa</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>
    </main>
    <!-- Script JavaScript para funcionalidades da página -->
    <script src="script.js"></script>
</body>
</html>
